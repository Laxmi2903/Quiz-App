# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL DataSource ───────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/quizdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ────────────────────────────────────────────────────────────────────────
# Use a strong, base64-encoded secret of at least 32 characters in production
app.jwt.secret=ThisIsAVerySecretKeyForQuizApplicationJWT2024!

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.quizapp=DEBUG
logging.level.org.springframework.security=INFO
